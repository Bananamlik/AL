<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>VFX3D_FORTRESS — Preview</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a12; color:#ccc; font:12px/1.4 monospace; display:flex; height:100vh; overflow:hidden; }
#sidebar { width:190px; padding:8px 6px; overflow-y:auto; background:#0d0d1a; border-right:1px solid #222; flex-shrink:0; }
#sidebar h2 { color:#3ee8ff; font-size:11px; margin-bottom:8px; letter-spacing:.06em; }
.btn { display:block; width:100%; padding:5px 8px; margin-bottom:3px; background:#111; border:1px solid #222; color:#aaa;
       cursor:pointer; text-align:left; border-radius:3px; font:11px monospace; transition:all .15s; }
.btn:hover { background:#1a1a2e; color:#fff; border-color:#3ee8ff44; }
.btn.active { background:#0e2233; color:#3ee8ff; border-color:#3ee8ff; }
.sep { font-size:9px; color:#444; margin:8px 0 3px; letter-spacing:.08em; }
#ctrl { position:absolute; bottom:12px; left:200px; display:flex; gap:8px; z-index:10; }
.cbtn { padding:6px 14px; background:#111; border:1px solid #333; color:#aaa; cursor:pointer;
        border-radius:3px; font:11px monospace; }
.cbtn:hover { background:#1a1a2e; color:#fff; }
#info { position:absolute; top:10px; left:200px; color:#3ee8ff; font:11px monospace; z-index:10; pointer-events:none; }
#scale { position:absolute; top:10px; right:10px; font:11px monospace; color:#555; z-index:10; }
canvas { display:block; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>VFX3D — 24 Types</h2>
  <div class="sep">── PRIORITY ──</div>
  <button class="btn active" data-type="eth">ETH 에테르</button>
  <button class="btn" data-type="elc">ELC 전기</button>
  <button class="btn" data-type="fir">FIR 불꽃</button>
  <button class="btn" data-type="ice">ICE 얼음</button>
  <button class="btn" data-type="wat">WAT 물</button>
  <div class="sep">── ELEMENTS ──</div>
  <button class="btn" data-type="wnd">WND 바람</button>
  <button class="btn" data-type="poi">POI 독</button>
  <button class="btn" data-type="rok">ROK 바위</button>
  <button class="btn" data-type="snd">SND 모래</button>
  <button class="btn" data-type="ert">ERT 흙</button>
  <button class="btn" data-type="wod">WOD 나무</button>
  <button class="btn" data-type="stm">STM 증기</button>
  <div class="sep">── SPECIAL ──</div>
  <button class="btn" data-type="irn">IRN 쇠</button>
  <button class="btn" data-type="dkf">DKF 흑염</button>
  <button class="btn" data-type="drg">DRG 용염</button>
  <button class="btn" data-type="hol">HOL 신성</button>
  <button class="btn" data-type="tim">TIM 시간</button>
  <button class="btn" data-type="sol">SOL 영혼</button>
  <button class="btn" data-type="neg">NEG 음에너지</button>
  <div class="sep">── EXOTIC ──</div>
  <button class="btn" data-type="arc">ARC 비전</button>
  <button class="btn" data-type="dim">DIM 차원</button>
  <button class="btn" data-type="dat">DAT 데이터</button>
  <button class="btn" data-type="pla">PLA 플라즈마</button>
  <button class="btn" data-type="chs">CHS 혼돈</button>
</div>

<div id="info">현재: <span id="lbl">ETH 에테르</span> &nbsp;|&nbsp; [Trail] → [Burst]</div>
<div id="scale">FORT_SCALE: <input id="scaleInput" type="range" min="1" max="50" value="15" style="width:80px;vertical-align:middle"> <span id="scaleVal">0.015</span></div>
<div id="ctrl">
  <button class="cbtn" id="btnTrail">▶ Trail</button>
  <button class="cbtn" id="btnBurst">💥 Burst</button>
  <button class="cbtn" id="btnClear">✕ Clear</button>
</div>

<!-- Three.js r128 from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/* ── Inline VFX3D_FORTRESS (copy of .js, stripped of export) ─── */
/* NOTE: in production, replace this with:
   <script src="VFX3D_FORTRESS.js"></script>
   This inline copy is for self-contained testing only.            */
</script>
<script src="VFX3D_FORTRESS.js"></script>

<script>
/* ════════════════════════════════════════════════════════════════
   TEST HARNESS
   ════════════════════════════════════════════════════════════════ */
const W = () => window.innerWidth - 190;
const H = () => window.innerHeight;

// ── Three.js setup ─────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x0a0a12, 1);
renderer.setSize(W(), H());
document.body.appendChild(renderer.domElement);
renderer.domElement.style.position = 'absolute';
renderer.domElement.style.left = '190px';

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, W() / H(), 0.01, 500);
camera.position.set(0, 0, 18);

// Soft ambient star field
{
  const geo = new THREE.BufferGeometry();
  const pts = new Float32Array(300 * 3);
  for (let i = 0; i < 300; i++) {
    pts[i*3]   = (Math.random() - .5) * 80;
    pts[i*3+1] = (Math.random() - .5) * 80;
    pts[i*3+2] = (Math.random() - .5) * 80;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pts, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ color:0x334, size:.08, sizeAttenuation:true })));
}

// ── State ──────────────────────────────────────────────────────
let currentType = 'eth';
let activeVFX   = null;
let trailTimer  = null;
const clock     = new THREE.Clock();

// ── Origin helper: random spread near center ───────────────────
function rndOrigin() {
  return new THREE.Vector3(
    (Math.random() - .5) * 1.2,
    (Math.random() - .5) * 0.6,
    0
  );
}

// ── Spawn / clear ──────────────────────────────────────────────
function spawnVFX() {
  clearVFX();
  // Re-read FORT_SCALE from slider before spawning
  const sv = parseInt(document.getElementById('scaleInput').value, 10);
  // Patch global (test only — not for production use)
  window._FORT_SCALE_OVERRIDE = sv / 1000;
  activeVFX = FortressVFX.spawn(currentType, scene);
}

function clearVFX() {
  if (trailTimer) { clearInterval(trailTimer); trailTimer = null; }
  FortressVFX.disposeAll(scene);
  activeVFX = null;
}

// ── Trail: emit every 80 ms, moving origin slightly ────────────
document.getElementById('btnTrail').addEventListener('click', () => {
  if (!activeVFX) spawnVFX();
  if (trailTimer) { clearInterval(trailTimer); trailTimer = null; return; }
  const dir = new THREE.Vector3(1, 0, 0);
  let t = 0;
  trailTimer = setInterval(() => {
    if (!activeVFX) return;
    t += 0.08;
    const origin = new THREE.Vector3(
      Math.sin(t * 0.7) * 2.5,
      Math.sin(t * 1.1) * 1.2,
      0
    );
    activeVFX.emitTrail(origin, dir);
  }, 80);
});

// ── Burst ──────────────────────────────────────────────────────
document.getElementById('btnBurst').addEventListener('click', () => {
  if (!activeVFX) spawnVFX();
  if (trailTimer) { clearInterval(trailTimer); trailTimer = null; }
  const center = new THREE.Vector3(
    (Math.random() - .5) * 1.5,
    (Math.random() - .5) * 0.8,
    0
  );
  activeVFX.burst(center);
  FortressVFX.scheduleDispose(activeVFX, scene, 3000);
  activeVFX = null;
});

// ── Clear ──────────────────────────────────────────────────────
document.getElementById('btnClear').addEventListener('click', clearVFX);

// ── Type buttons ───────────────────────────────────────────────
document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentType = btn.dataset.type;
    document.getElementById('lbl').textContent = btn.textContent;
    if (activeVFX || trailTimer) {
      clearVFX();
      // re-spawn if trail was running
    }
  });
});

// ── Scale slider ───────────────────────────────────────────────
document.getElementById('scaleInput').addEventListener('input', function() {
  const v = this.value / 1000;
  document.getElementById('scaleVal').textContent = v.toFixed(3);
  // Note: FORT_SCALE is const — to live-tune, reload page with ?scale=N
  // This just shows the value for documentation.
});

// ── Resize ─────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  renderer.setSize(W(), H());
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
});

// ── Keyboard shortcuts ─────────────────────────────────────────
window.addEventListener('keydown', e => {
  if (e.code === 'Space') document.getElementById('btnTrail').click();
  if (e.code === 'KeyB')  document.getElementById('btnBurst').click();
  if (e.code === 'KeyC')  document.getElementById('btnClear').click();
});

// ── Animate ────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05); // clamp for tab blur
  FortressVFX.update(dt);
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
